cr6b0_allocateddays: =DateDiff(cr6b0_startdate,cr6b0_enddate)
cr6b0_calendardaysallocated: =cr6b0_BusinessDays.cr6b0_july * (cr6b0_july/100) + cr6b0_BusinessDays.cr6b0_august * (cr6b0_august/100) + cr6b0_BusinessDays.cr6b0_september * (cr6b0_september/100) + cr6b0_BusinessDays.cr6b0_october * (cr6b0_october/100) + cr6b0_BusinessDays.cr6b0_november * (cr6b0_november/100) + cr6b0_BusinessDays.cr6b0_december * (cr6b0_december/100) + cr6b0_BusinessDays.cr6b0_january * (cr6b0_january/100) + cr6b0_BusinessDays.cr6b0_february * (cr6b0_february/100) + cr6b0_BusinessDays.cr6b0_march * (cr6b0_march/100) + cr6b0_BusinessDays.cr6b0_april * (cr6b0_april/100) + cr6b0_BusinessDays.cr6b0_may * (cr6b0_may/100) + cr6b0_BusinessDays.cr6b0_june + (cr6b0_june/100)
cr6b0_totalcost: =cr6b0_RateLookup.cr6b0_rate * (8 * cr6b0_calendardaysallocated)
