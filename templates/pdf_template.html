<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{company_name}</title>
    <style>
        /* Page Setup */
        @page {
            size: {page_size};
            margin: 2.5cm 2cm 3cm 2cm;
            
            @top-center {
                content: "{company_name}";
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 9pt;
                color: {secondary_color};
                border-bottom: 1px solid {primary_color};
                padding-bottom: 5pt;
            }
            
            @bottom-center {
                content: "{footer_text} • " counter(page) " / " counter(pages);
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 9pt;
                color: #666;
            }
            
            @bottom-right {
                content: "{generation_date}";
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 8pt;
                color: #999;
            }
        }
        
        @page :first {
            @top-center {
                content: none;
            }
        }
        
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #333;
            background: white;
        }
        
        /* Logo */
        .logo {
            width: 200pt;
            height: auto;
            margin-bottom: 20pt;
        }
        
        /* Cover Page Elements */
        .cover-page {
            page-break-after: always;
            text-align: center;
            padding-top: 100pt;
        }
        
        .cover-title {
            font-size: 32pt;
            font-weight: bold;
            color: {primary_color};
            margin-bottom: 20pt;
            line-height: 1.2;
        }
        
        .cover-subtitle {
            font-size: 18pt;
            color: {secondary_color};
            margin-bottom: 40pt;
        }
        
        .cover-info {
            font-size: 12pt;
            color: #666;
            margin-top: 60pt;
        }
        
        /* Headings */
        h1 {
            font-size: 24pt;
            color: {primary_color};
            margin-top: 30pt;
            margin-bottom: 15pt;
            padding-bottom: 8pt;
            border-bottom: 3px solid {accent_color};
            page-break-after: avoid;
            font-weight: 600;
        }
        
        h2 {
            font-size: 18pt;
            color: {primary_color};
            margin-top: 25pt;
            margin-bottom: 12pt;
            padding-left: 10pt;
            border-left: 4px solid {accent_color};
            page-break-after: avoid;
            font-weight: 600;
        }
        
        h3 {
            font-size: 14pt;
            color: {secondary_color};
            margin-top: 20pt;
            margin-bottom: 10pt;
            page-break-after: avoid;
            font-weight: 600;
        }
        
        h4 {
            font-size: 12pt;
            color: {secondary_color};
            margin-top: 15pt;
            margin-bottom: 8pt;
            page-break-after: avoid;
            font-weight: 600;
        }
        
        h5, h6 {
            font-size: 11pt;
            color: #555;
            margin-top: 12pt;
            margin-bottom: 6pt;
            page-break-after: avoid;
            font-weight: 600;
        }
        
        /* Paragraphs */
        p {
            margin-bottom: 10pt;
            text-align: justify;
            orphans: 3;
            widows: 3;
        }
        
        /* Lists */
        ul, ol {
            margin-bottom: 12pt;
            margin-left: 20pt;
            padding-left: 10pt;
        }
        
        li {
            margin-bottom: 6pt;
            orphans: 2;
            widows: 2;
        }
        
        ul ul, ol ol, ul ol, ol ul {
            margin-top: 6pt;
            margin-bottom: 6pt;
        }
        
        /* Code Blocks */
        code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 9pt;
            background-color: #f4f4f4;
            padding: 2pt 4pt;
            border-radius: 3px;
            color: #c7254e;
        }
        
        pre {
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            border-left: 4px solid {accent_color};
            padding: 12pt;
            margin-bottom: 15pt;
            overflow-x: auto;
            page-break-inside: avoid;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 8pt;
            line-height: 1.1;
            white-space: pre;
            letter-spacing: 0;
            word-spacing: 0;
        }
        
        pre code {
            background-color: transparent;
            padding: 0;
            color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 8pt;
            line-height: 1.1;
            letter-spacing: 0;
            word-spacing: 0;
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15pt;
            page-break-inside: avoid;
            font-size: 10pt;
        }
        
        thead {
            background-color: {primary_color};
            color: white;
        }
        
        th {
            padding: 10pt;
            text-align: left;
            font-weight: 600;
            border: 1px solid #ddd;
        }
        
        td {
            padding: 8pt 10pt;
            border: 1px solid #ddd;
        }
        
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        tbody tr:hover {
            background-color: #f0f0f0;
        }
        
        /* Blockquotes */
        blockquote {
            margin: 15pt 0;
            padding: 10pt 15pt;
            background-color: #f9f9f9;
            border-left: 5px solid {accent_color};
            font-style: italic;
            color: #555;
            page-break-inside: avoid;
        }
        
        /* Horizontal Rules */
        hr {
            border: none;
            border-top: 2px solid {accent_color};
            margin: 20pt 0;
            opacity: 0.5;
        }
        
        /* Links */
        a {
            color: {accent_color};
            text-decoration: none;
            font-weight: 500;
        }
        
        a:after {
            content: " (" attr(href) ")";
            font-size: 8pt;
            color: #666;
            font-weight: normal;
        }
        
        /* Images */
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 15pt auto;
            page-break-inside: avoid;
        }
        
        /* Page Breaks */
        .page-break {
            page-break-after: always;
        }
        
        /* Utility Classes */
        .text-center {
            text-align: center;
        }
        
        .text-right {
            text-align: right;
        }
        
        .highlight {
            background-color: #fff3cd;
            padding: 2pt 6pt;
            border-radius: 3px;
        }
        
        /* Print Optimizations */
        @media print {
            body {
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
        }
        
        /* Content Container */
        .content {
            max-width: 100%;
        }
        
        /* Metadata Section */
        .metadata {
            background-color: #f8f9fa;
            padding: 15pt;
            margin-bottom: 25pt;
            border-radius: 5px;
            border: 1px solid #dee2e6;
            page-break-inside: avoid;
        }
        
        .metadata h3 {
            margin-top: 0;
            color: {primary_color};
        }
        
        .metadata p {
            margin-bottom: 5pt;
            text-align: left;
        }
        
        /* Warning/Info Boxes */
        .info-box {
            padding: 12pt;
            margin: 15pt 0;
            border-radius: 5px;
            page-break-inside: avoid;
        }
        
        .info-box.info {
            background-color: #d1ecf1;
            border-left: 5px solid #0c5460;
            color: #0c5460;
        }
        
        .info-box.warning {
            background-color: #fff3cd;
            border-left: 5px solid #856404;
            color: #856404;
        }
        
        .info-box.success {
            background-color: #d4edda;
            border-left: 5px solid #155724;
            color: #155724;
        }
        
        /* Table of Contents Styles */
        .table-of-contents {
            page-break-after: always;
            margin-bottom: 30pt;
            padding: 20pt;
            border: 2px solid {primary_color};
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        
        .table-of-contents h2 {
            color: {primary_color};
            margin-top: 0;
            margin-bottom: 20pt;
            border-left: none;
            padding-left: 0;
            text-align: center;
            border-bottom: 2px solid {accent_color};
            padding-bottom: 10pt;
        }
        
        .toc-list {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }
        
        .toc-list li {
            margin-bottom: 8pt;
            line-height: 1.4;
        }
        
        .toc-list a {
            text-decoration: none;
            color: #333;
            transition: color 0.2s;
        }
        
        .toc-list a:hover {
            color: {primary_color};
        }
        
        .toc-level-1 {
            font-weight: 600;
            font-size: 12pt;
            margin-top: 10pt;
            color: {primary_color};
        }
        
        .toc-level-2 {
            padding-left: 20pt;
            font-size: 11pt;
            font-weight: 500;
        }
        
        .toc-level-3 {
            padding-left: 40pt;
            font-size: 10pt;
        }
        
        .toc-level-4,
        .toc-level-5,
        .toc-level-6 {
            padding-left: 60pt;
            font-size: 9pt;
            color: #666;
        }
        
        /* Enhanced Code Blocks with Line Numbers */
        .codehilite {
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            border-left: 4px solid {accent_color};
            padding: 12pt;
            margin-bottom: 15pt;
            overflow-x: auto;
            page-break-inside: avoid;
            border-radius: 4px;
            position: relative;
        }
        
        .codehilite pre {
            margin: 0;
            padding: 0;
            border: none;
            background-color: transparent;
        }
        
        .codehilite .linenos {
            color: #999;
            border-right: 1px solid #ddd;
            padding-right: 8pt;
            margin-right: 8pt;
            user-select: none;
        }
        
        /* Syntax Highlighting Colors */
        .codehilite .hll { background-color: #ffffcc }
        .codehilite .c { color: #408080; font-style: italic } /* Comment */
        .codehilite .err { border: 1px solid #FF0000 } /* Error */
        .codehilite .k { color: #008000; font-weight: bold } /* Keyword */
        .codehilite .o { color: #666666 } /* Operator */
        .codehilite .cm { color: #408080; font-style: italic } /* Comment.Multiline */
        .codehilite .cp { color: #BC7A00 } /* Comment.Preproc */
        .codehilite .c1 { color: #408080; font-style: italic } /* Comment.Single */
        .codehilite .cs { color: #408080; font-style: italic } /* Comment.Special */
        .codehilite .gd { color: #A00000 } /* Generic.Deleted */
        .codehilite .ge { font-style: italic } /* Generic.Emph */
        .codehilite .gr { color: #FF0000 } /* Generic.Error */
        .codehilite .gh { color: #000080; font-weight: bold } /* Generic.Heading */
        .codehilite .gi { color: #00A000 } /* Generic.Inserted */
        .codehilite .go { color: #888888 } /* Generic.Output */
        .codehilite .gp { color: #000080; font-weight: bold } /* Generic.Prompt */
        .codehilite .gs { font-weight: bold } /* Generic.Strong */
        .codehilite .gu { color: #800080; font-weight: bold } /* Generic.Subheading */
        .codehilite .gt { color: #0044DD } /* Generic.Traceback */
        .codehilite .kc { color: #008000; font-weight: bold } /* Keyword.Constant */
        .codehilite .kd { color: #008000; font-weight: bold } /* Keyword.Declaration */
        .codehilite .kn { color: #008000; font-weight: bold } /* Keyword.Namespace */
        .codehilite .kp { color: #008000 } /* Keyword.Pseudo */
        .codehilite .kr { color: #008000; font-weight: bold } /* Keyword.Reserved */
        .codehilite .kt { color: #B00040 } /* Keyword.Type */
        .codehilite .m { color: #666666 } /* Literal.Number */
        .codehilite .s { color: #BA2121 } /* Literal.String */
        .codehilite .na { color: #7D9029 } /* Name.Attribute */
        .codehilite .nb { color: #008000 } /* Name.Builtin */
        .codehilite .nc { color: #0000FF; font-weight: bold } /* Name.Class */
        .codehilite .no { color: #880000 } /* Name.Constant */
        .codehilite .nd { color: #AA22FF } /* Name.Decorator */
        .codehilite .ni { color: #999999; font-weight: bold } /* Name.Entity */
        .codehilite .ne { color: #D2413A; font-weight: bold } /* Name.Exception */
        .codehilite .nf { color: #0000FF } /* Name.Function */
        .codehilite .nl { color: #A0A000 } /* Name.Label */
        .codehilite .nn { color: #0000FF; font-weight: bold } /* Name.Namespace */
        .codehilite .nt { color: #008000; font-weight: bold } /* Name.Tag */
        .codehilite .nv { color: #19177C } /* Name.Variable */
        .codehilite .ow { color: #AA22FF; font-weight: bold } /* Operator.Word */
        .codehilite .w { color: #bbbbbb } /* Text.Whitespace */
        .codehilite .mb { color: #666666 } /* Literal.Number.Bin */
        .codehilite .mf { color: #666666 } /* Literal.Number.Float */
        .codehilite .mh { color: #666666 } /* Literal.Number.Hex */
        .codehilite .mi { color: #666666 } /* Literal.Number.Integer */
        .codehilite .mo { color: #666666 } /* Literal.Number.Oct */
        .codehilite .sb { color: #BA2121 } /* Literal.String.Backtick */
        .codehilite .sc { color: #BA2121 } /* Literal.String.Char */
        .codehilite .sd { color: #BA2121; font-style: italic } /* Literal.String.Doc */
        .codehilite .s2 { color: #BA2121 } /* Literal.String.Double */
        .codehilite .se { color: #BB6622; font-weight: bold } /* Literal.String.Escape */
        .codehilite .sh { color: #BA2121 } /* Literal.String.Heredoc */
        .codehilite .si { color: #BB6688; font-weight: bold } /* Literal.String.Interpol */
        .codehilite .sx { color: #008000 } /* Literal.String.Other */
        .codehilite .sr { color: #BB6688 } /* Literal.String.Regex */
        .codehilite .s1 { color: #BA2121 } /* Literal.String.Single */
        .codehilite .ss { color: #19177C } /* Literal.String.Symbol */
        .codehilite .bp { color: #008000 } /* Name.Builtin.Pseudo */
        .codehilite .vc { color: #19177C } /* Name.Variable.Class */
        .codehilite .vg { color: #19177C } /* Name.Variable.Global */
        .codehilite .vi { color: #19177C } /* Name.Variable.Instance */
        .codehilite .il { color: #666666 } /* Literal.Number.Integer.Long */
        
        /* Admonition (Note/Warning) Boxes */
        .admonition {
            padding: 12pt;
            margin: 15pt 0;
            border-radius: 5px;
            page-break-inside: avoid;
            border-left: 5px solid {accent_color};
            background-color: #f9f9f9;
        }
        
        .admonition-title {
            font-weight: 600;
            margin-bottom: 8pt;
            font-size: 12pt;
            color: {primary_color};
        }
        
        .admonition.note {
            border-left-color: #3498db;
            background-color: #e7f3ff;
        }
        
        .admonition.note .admonition-title {
            color: #2980b9;
        }
        
        .admonition.warning {
            border-left-color: #f39c12;
            background-color: #fff3cd;
        }
        
        .admonition.warning .admonition-title {
            color: #e67e22;
        }
        
        .admonition.danger,
        .admonition.error {
            border-left-color: #e74c3c;
            background-color: #ffe7e7;
        }
        
        .admonition.danger .admonition-title,
        .admonition.error .admonition-title {
            color: #c0392b;
        }
        
        .admonition.tip,
        .admonition.hint {
            border-left-color: #27ae60;
            background-color: #d4edda;
        }
        
        .admonition.tip .admonition-title,
        .admonition.hint .admonition-title {
            color: #1e8449;
        }
        
        .admonition.important {
            border-left-color: #9b59b6;
            background-color: #f4ecf7;
        }
        
        .admonition.important .admonition-title {
            color: #7d3c98;
        }
    </style>
</head>
<body>
    <div class="cover-page">
        {logo_html}
        <h1 class="cover-title">{company_name}</h1>
        <p class="cover-subtitle">Technical Documentation</p>
        <div class="cover-info">
            <p>Generated: {generation_date}</p>
        </div>
    </div>
    
    <div class="content">
        {markdown_content}
    </div>
</body>
</html>
