<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{company_name}</title>
    <style>
        /* Page Setup */
        @page {
            size: {page_size};
            margin: 2.5cm 2cm 3cm 2cm;
            
            @top-center {
                content: "{company_name}";
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 9pt;
                color: {secondary_color};
                border-bottom: 1px solid {primary_color};
                padding-bottom: 5pt;
            }
            
            @bottom-center {
                content: "{footer_text} • " counter(page) " / " counter(pages);
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 9pt;
                color: #666;
            }
            
            @bottom-right {
                content: "{generation_date}";
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 8pt;
                color: #999;
            }
        }
        
        @page :first {
            @top-center {
                content: none;
            }
        }
        
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #333;
            background: white;
        }
        
        /* Logo */
        .logo {
            width: 200pt;
            height: auto;
            margin-bottom: 20pt;
        }
        
        /* Cover Page Elements */
        .cover-page {
            page-break-after: always;
            text-align: center;
            padding-top: 100pt;
        }
        
        .cover-title {
            font-size: 32pt;
            font-weight: bold;
            color: {primary_color};
            margin-bottom: 20pt;
            line-height: 1.2;
        }
        
        .cover-subtitle {
            font-size: 18pt;
            color: {secondary_color};
            margin-bottom: 40pt;
        }
        
        .cover-info {
            font-size: 12pt;
            color: #666;
            margin-top: 60pt;
        }
        
        /* Headings */
        h1 {
            font-size: 24pt;
            color: {primary_color};
            margin-top: 30pt;
            margin-bottom: 15pt;
            padding-bottom: 8pt;
            border-bottom: 3px solid {accent_color};
            page-break-after: avoid;
            font-weight: 600;
        }
        
        h2 {
            font-size: 18pt;
            color: {primary_color};
            margin-top: 25pt;
            margin-bottom: 12pt;
            padding-left: 10pt;
            border-left: 4px solid {accent_color};
            page-break-after: avoid;
            font-weight: 600;
        }
        
        h3 {
            font-size: 14pt;
            color: {secondary_color};
            margin-top: 20pt;
            margin-bottom: 10pt;
            page-break-after: avoid;
            font-weight: 600;
        }
        
        h4 {
            font-size: 12pt;
            color: {secondary_color};
            margin-top: 15pt;
            margin-bottom: 8pt;
            page-break-after: avoid;
            font-weight: 600;
        }
        
        h5, h6 {
            font-size: 11pt;
            color: #555;
            margin-top: 12pt;
            margin-bottom: 6pt;
            page-break-after: avoid;
            font-weight: 600;
        }
        
        /* Paragraphs */
        p {
            margin-bottom: 10pt;
            text-align: justify;
            orphans: 3;
            widows: 3;
        }
        
        /* Lists */
        ul, ol {
            margin-bottom: 12pt;
            margin-left: 20pt;
            padding-left: 10pt;
        }
        
        li {
            margin-bottom: 6pt;
            orphans: 2;
            widows: 2;
        }
        
        ul ul, ol ol, ul ol, ol ul {
            margin-top: 6pt;
            margin-bottom: 6pt;
        }
        
        /* Code Blocks */
        code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 9pt;
            background-color: #f4f4f4;
            padding: 2pt 4pt;
            border-radius: 3px;
            color: #c7254e;
        }
        
        pre {
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            border-left: 4px solid {accent_color};
            padding: 12pt;
            margin-bottom: 15pt;
            overflow-x: auto;
            page-break-inside: avoid;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 8pt;
            line-height: 1.1;
            white-space: pre;
            letter-spacing: 0;
            word-spacing: 0;
        }
        
        pre code {
            background-color: transparent;
            padding: 0;
            color: #333;
            font-family: 'Courier New', Courier, monospace;
            font-size: 8pt;
            line-height: 1.1;
            letter-spacing: 0;
            word-spacing: 0;
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15pt;
            page-break-inside: avoid;
            font-size: 10pt;
        }
        
        thead {
            background-color: {primary_color};
            color: white;
        }
        
        th {
            padding: 10pt;
            text-align: left;
            font-weight: 600;
            border: 1px solid #ddd;
        }
        
        td {
            padding: 8pt 10pt;
            border: 1px solid #ddd;
        }
        
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        tbody tr:hover {
            background-color: #f0f0f0;
        }
        
        /* Blockquotes */
        blockquote {
            margin: 15pt 0;
            padding: 10pt 15pt;
            background-color: #f9f9f9;
            border-left: 5px solid {accent_color};
            font-style: italic;
            color: #555;
            page-break-inside: avoid;
        }
        
        /* Horizontal Rules */
        hr {
            border: none;
            border-top: 2px solid {accent_color};
            margin: 20pt 0;
            opacity: 0.5;
        }
        
        /* Links */
        a {
            color: {accent_color};
            text-decoration: none;
            font-weight: 500;
        }
        
        a:after {
            content: " (" attr(href) ")";
            font-size: 8pt;
            color: #666;
            font-weight: normal;
        }
        
        /* Images */
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 15pt auto;
            page-break-inside: avoid;
        }
        
        /* Page Breaks */
        .page-break {
            page-break-after: always;
        }
        
        /* Utility Classes */
        .text-center {
            text-align: center;
        }
        
        .text-right {
            text-align: right;
        }
        
        .highlight {
            background-color: #fff3cd;
            padding: 2pt 6pt;
            border-radius: 3px;
        }
        
        /* Print Optimizations */
        @media print {
            body {
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
        }
        
        /* Content Container */
        .content {
            max-width: 100%;
        }
        
        /* Metadata Section */
        .metadata {
            background-color: #f8f9fa;
            padding: 15pt;
            margin-bottom: 25pt;
            border-radius: 5px;
            border: 1px solid #dee2e6;
            page-break-inside: avoid;
        }
        
        .metadata h3 {
            margin-top: 0;
            color: {primary_color};
        }
        
        .metadata p {
            margin-bottom: 5pt;
            text-align: left;
        }
        
        /* Warning/Info Boxes */
        .info-box {
            padding: 12pt;
            margin: 15pt 0;
            border-radius: 5px;
            page-break-inside: avoid;
        }
        
        .info-box.info {
            background-color: #d1ecf1;
            border-left: 5px solid #0c5460;
            color: #0c5460;
        }
        
        .info-box.warning {
            background-color: #fff3cd;
            border-left: 5px solid #856404;
            color: #856404;
        }
        
        .info-box.success {
            background-color: #d4edda;
            border-left: 5px solid #155724;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="cover-page">
        {logo_html}
        <h1 class="cover-title">{company_name}</h1>
        <p class="cover-subtitle">Technical Documentation</p>
        <div class="cover-info">
            <p>Generated: {generation_date}</p>
        </div>
    </div>
    
    <div class="content">
        {markdown_content}
    </div>
</body>
</html>
